name: Build Android APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Show Android SDK info
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed 2>/dev/null | head -40 || true

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true

      - name: Install dependencies (yarn)
        working-directory: frontend
        run: |
          # não usa --frozen-lockfile pra tolerar pequenas variações pós-merge
          yarn install --network-timeout 100000

      - name: Build React (CRA)
        working-directory: frontend
        env:
          CI: "false"
        run: yarn build

      - name: Generate icon/splash assets (PIL)
        working-directory: frontend
        run: |
          python3 -m pip install --quiet --user Pillow
          python3 scripts/generate_assets.py || echo "asset script failed, continuing"
          ls -la resources/

      - name: Add Android platform (clean)
        working-directory: frontend
        run: |
          rm -rf android
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Apply icons & splash to Android
        working-directory: frontend
        run: |
          npx -y @capacitor/assets@^3 generate --android \
            --iconBackgroundColor "#0f0f0f" \
            --iconBackgroundColorDark "#0f0f0f" \
            --splashBackgroundColor "#0f0f0f" \
            --splashBackgroundColorDark "#0f0f0f" \
            --assetPath resources || echo "icon generation skipped"

      - name: Patch app version
        working-directory: frontend
        run: |
          set -e
          VC=${GITHUB_RUN_NUMBER:-1}
          VN="1.0.${VC}"
          # editar versionCode/versionName se existirem
          if grep -q "versionCode 1" android/app/build.gradle; then
            sed -i "s/versionCode 1/versionCode ${VC}/" android/app/build.gradle
          fi
          if grep -q 'versionName "1.0"' android/app/build.gradle; then
            sed -i "s/versionName \"1.0\"/versionName \"${VN}\"/" android/app/build.gradle
          fi
          echo "Building version ${VN} (code ${VC})"
          grep -E "versionCode|versionName" android/app/build.gradle | head -4

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        working-directory: frontend
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APK encontrado: $APK"
          NAME="lb-mecanica-v1.0.${GITHUB_RUN_NUMBER}.apk"
          cp "$APK" "../$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "fullpath=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.fullpath }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (main / master / principal)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/principal'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v1.0.${{ github.run_number }}
          name: "LB Mecânica APK v1.0.${{ github.run_number }}"
          body: |
            APK gerado automaticamente do commit ${{ github.sha }}.
            Backend: https://lbnovo.onrender.com
            Login: lbmecanica / eaixuxu
          files: ${{ steps.apk.outputs.fullpath }}
          fail_on_unmatched_files: false
