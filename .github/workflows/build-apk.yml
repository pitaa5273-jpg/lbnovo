name: Build Android APK

on:
  push:
    branches: ["**"]
    paths:
      - "frontend/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build React (CRA)
        run: CI=false yarn build

      - name: Generate icons & splash assets
        run: |
          python3 scripts/generate_assets.py || true
          npx -y @capacitor/assets@^3 generate --android \
            --iconBackgroundColor "#0f0f0f" \
            --iconBackgroundColorDark "#0f0f0f" \
            --splashBackgroundColor "#0f0f0f" \
            --splashBackgroundColorDark "#0f0f0f" \
            --assetPath resources

      - name: Add Android platform (fresh)
        run: |
          rm -rf android
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Re-apply icons after platform add
        run: |
          npx -y @capacitor/assets@^3 generate --android \
            --iconBackgroundColor "#0f0f0f" \
            --iconBackgroundColorDark "#0f0f0f" \
            --splashBackgroundColor "#0f0f0f" \
            --splashBackgroundColorDark "#0f0f0f" \
            --assetPath resources

      - name: Patch app version & label
        run: |
          set -e
          # Define versionName / versionCode via env so cada build é único
          VC=${GITHUB_RUN_NUMBER:-1}
          VN="1.0.${VC}"
          sed -i "s/versionCode 1/versionCode ${VC}/" android/app/build.gradle || true
          sed -i "s/versionName \"1.0\"/versionName \"${VN}\"/" android/app/build.gradle || true
          echo "App version: ${VN} (code ${VC})"

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "Path: $APK"
          echo "path=$APK" >> $GITHUB_OUTPUT
          NAME="lb-mecanica-v1.0.${GITHUB_RUN_NUMBER}.apk"
          cp "$APK" "../$NAME"
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.name }}
          if-no-files-found: error

      - name: Create Release (on push to main/master)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v1.0.${{ github.run_number }}
          name: "LB Mecânica APK v1.0.${{ github.run_number }}"
          body: |
            APK gerado automaticamente a partir do commit ${{ github.sha }}.
            Backend: https://lbnovo.onrender.com
            Login: lbmecanica / eaixuxu
          files: ${{ steps.apk.outputs.name }}
          fail_on_unmatched_files: false
