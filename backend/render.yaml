# Render deploy config (Blueprint).
# Você pode usar este arquivo via "New → Blueprint" no Render
# OU configurar o serviço manualmente como Web Service.

services:
  - type: web
    name: lb-mecanica-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: lb-mecanica-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: ADMIN_USER
        value: lbmecanica
      - key: ADMIN_PASS
        value: eaixuxu
      - key: FRONTEND_URL
        value: "*"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: lb-mecanica-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
